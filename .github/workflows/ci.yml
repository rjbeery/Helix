name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bom:
    name: BOM check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node and pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install
      - name: Run BOM check
        run: pnpm run check-bom

  build:
    name: Build & Typecheck
    needs: bom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node and pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck all
        run: pnpm -w -r typecheck || true
      - name: Lint (optional)
        run: pnpm -w -r lint || true
      - name: Build all packages
        run: pnpm -w -r build || true

  python-tests:
    name: Python tests
    needs: bom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install API requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f apps/api/requirements.txt ]; then python -m pip install -r apps/api/requirements.txt; fi
      - name: Run API tests (if present)
        run: |
          if [ -d apps/api ] && [ -f apps/api/requirements.txt ]; then cd apps/api && pytest -q || true; fi

  deploy-frontend:
    name: Deploy Frontend → S3 + CloudFront
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter helix-web build
        env:
          VITE_API_URL: https://api.helixai.live

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync apps/web/dist s3://helixai-site-helixai-live \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"
          aws s3 sync apps/web/dist s3://helixai-site-helixai-live \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1WTW4Q4V8UY5C \
            --paths "/*"

  deploy-api:
    name: Deploy API → ECR + Lambda
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Lambda image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPO: ${{ secrets.ECR_API_REPO }}
          IMAGE_TAG: ${{ github.sha }}-lambda
        run: |
          docker build -f Dockerfile.lambda \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest-lambda \
            .

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPO: ${{ secrets.ECR_API_REPO }}
          IMAGE_TAG: ${{ github.sha }}-lambda
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest-lambda

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPO: ${{ secrets.ECR_API_REPO }}
          IMAGE_TAG: ${{ github.sha }}-lambda
        run: |
          aws lambda update-function-code \
            --function-name helixai-api \
            --image-uri $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          aws lambda wait function-updated \
            --function-name helixai-api
